<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sites à vendre - Fortuna</title>
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }

        /* Header identique */
        header {
            background: #0f172a;
            color: white;
            padding: 12px 5%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid #3b82f6;
        }
        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-img { height: 70px; width: auto; }
        nav { display: flex; gap: 40px; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: 600; }
        nav a:hover { color: #60a5fa; }
        .btn-connexion {
            background: #3b82f6;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 700;
            color: white !important;
        }

        /* Contenu principal */
        .main-container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .search-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        input, select {
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.4s;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .prix {
            font-size: 1.5rem;
            font-weight: bold;
            color: #16a34a;
            margin: 12px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
        }

        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
        }

        @media (max-width: 768px) {
            .search-filter-bar { flex-direction: column; align-items: stretch; }
            .search-input { min-width: auto; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-container">
            <a href="acceuil.html" class="logo">
                <img src="1781211192450.png" alt="Fortuna Logo" class="logo-img" style="width: 200px; height: 180px; border-radius: 50%; object-fit: cover; margin: 10px 150px 10px 0px;"  >
            </a>
            <nav>
                <a href="acceuil.html">Accueil</a>
                <a href="sites-a-vendre.html">Sites à vendre</a>
                <a href="publier-un-site.html">Publier un site</a>
                <div id="user-info">
                    <a href="connexion.html" class="btn-connexion" id="btn-connexion">Connexion</a>
                    <span id="user-nom" style="display:none; color:white; font-weight:bold;"></span>
                  </div>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <h1 class="page-title">Sites à vendre</h1>
        <p style="text-align:center; margin-bottom:30px; color:#555;">Découvrez les créations des développeurs amateurs</p>

        <!-- Barre de recherche et filtres -->
        <div class="search-filter-bar">
            <input type="text" class="search-input" placeholder="Rechercher un site (e-commerce, blog, portfolio...)">
            
            <div class="filters">
                <select>
                    <option value="">Toutes catégories</option>
                    <option value="ecommerce">E-commerce</option>
                    <option value="portfolio">Portfolio</option>
                    <option value="blog">Blog</option>
                    <option value="autre">Autre</option>
                </select>
                
                <select>
                    <option value="">Prix</option>
                    <option value="low">Moins de 50 000 FCFA</option>
                    <option value="medium">50 000 - 100 000 FCFA</option>
                    <option value="high">Plus de 100 000 FCFA</option>
                </select>
            </div>
            
            <button class="btn" onclick="alert('Fonction de recherche en cours de développement')">Rechercher</button>
        </div>

        <!-- Grille des sites -->
        <div class="grid" id="sites-grid">
           

            <!-- Tu peux ajouter d'autres cartes ici -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Fortuna - Marketplace pour développeurs amateurs</p>
    </footer>
    <script>
       const API = 'http://localhost:3000/api';
const nom = localStorage.getItem('nom');

if (nom) {
  document.getElementById('btn-connexion').style.display = 'none';
  document.getElementById('user-nom').style.display = 'inline';
  document.getElementById('user-nom').textContent = '👤 ' + nom;
  const btnDeco = document.createElement('button');
  btnDeco.textContent = 'Déconnexion';
  btnDeco.style.cssText = 'background:red; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; margin-left:15px;';
  btnDeco.onclick = function() {
    localStorage.removeItem('token');
    localStorage.removeItem('nom');
    window.location.reload();
  };
  document.getElementById('user-info').appendChild(btnDeco);
}

async function chargerSites() {
  const grid = document.getElementById('sites-grid');
  if (!grid) return;

  try {
    const res = await fetch(`${API}/sites`);
    const sites = await res.json();

    grid.innerHTML = '';

    if (sites.length === 0) {
      grid.innerHTML = '<p style="grid-column: 1 / -1; text-align:center; color:gray;">Aucun site publié pour le moment.</p>';
      return;
    }

    sites.forEach(site => {
      grid.innerHTML += `
        <div class="card">
          <div style="height:180px; overflow:hidden;">
            ${site.images
              ? `<img src="http://localhost:3000/uploads/${site.images.split(',')[0]}" style="width:100%; height:100%; object-fit:cover;">`
              : `<div style="background: linear-gradient(135deg, #1e3a5f, #2563eb); height:100%; display:flex; align-items:center; justify-content:center; font-size:50px;">🌐</div>`
            }
          </div>
          <div class="card-content">
            <h3>${site.titre}</h3>
            <p>${site.description ? site.description.substring(0, 85) + '...' : ''}</p>
            <p class="prix">${Number(site.prix).toLocaleString()} FCFA</p>
            <a href="detail-site.html?id=${site.id}" class="btn">Voir détails</a>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error('Erreur:', err);
    grid.innerHTML = '<p style="grid-column: 1 / -1; text-align:center; color:red;">Erreur de chargement.</p>';
  }
}

chargerSites();
</script>
</body>
</html>
